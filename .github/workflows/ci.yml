name: CI

on:
  push:
    branches:
      - main
      - improve/guest-experience
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Build (client + server)
        run: pnpm run build
        env:
          CI: true

      - name: Prettier check (non-blocking)
        run: pnpm exec -- prettier --check . || true